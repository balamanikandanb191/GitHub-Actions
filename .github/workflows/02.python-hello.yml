name: Run hello
on: push

jobs:
  python-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Print hello
        run: echo "Hello from Python Workflow"
